<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<title>CryptoTracker</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
	</head>
	<body class="bg-light">
		<div class="container mt-5">
			<h1 class="mb-4">🚀 Мій Крипто Стартап</h1>
			<div class="card p-4 shadow-sm mb-4">
				<h3>
					Актуальна ціна Bitcoin:
					<span class="text-success" th:text="'$' + ${btcPrice}">$0.00</span>
				</h3>
				<p class="text-muted small">
					Дані отримані через зовнішний JSON API (Jackson Parser)
				</p>
			</div>
			<p>Портфелей в базі: <span th:text="${portfolios.size()}">0</span></p>
		</div>
	</body>
</html>
