<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>CryptoTracker</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<style>
			body {
				background-color: #121212;
				color: #e0e0e0;
			}
			.card {
				background-color: #1e1e1e;
				border: 1px solid #333;
			}
			.coin-row {
				background: #252525;
				border-radius: 8px;
				padding: 10px;
				margin-bottom: 8px;
				border: 1px solid #444;
			}
			.price-tag {
				color: #0dcaf0;
				font-weight: bold;
			}
			.portfolio-total {
				color: #20c997;
				font-size: 1.1rem;
				font-weight: bold;
			}
			.btn-delete-item {
				color: #ff5252;
				text-decoration: none;
				font-size: 1.5rem;
				line-height: 1;
				margin-left: 15px;
			}
			.btn-delete-item:hover {
				color: #ff1744;
			}
			.market-val {
				font-weight: 900;
				color: #ffc107;
			}
			.chart-container {
				height: 250px;
				width: 100%;
				position: relative;
			}
			#chartStatus {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				color: #666;
				display: none;
			}
		</style>

		<script>
			function saveScroll() {
				localStorage.setItem('scrollPos', window.scrollY)
			}

			window.addEventListener('load', function () {
				const scrollPos = localStorage.getItem('scrollPos')
				if (scrollPos) {
					window.scrollTo(0, scrollPos)
					localStorage.removeItem('scrollPos')
				}
			})
		</script>
	</head>
	<body>
		<div class="container mt-5 pb-5">
			<div class="d-flex justify-content-between align-items-center mb-4">
				<h1 class="text-white">
					🚀 CryptoTracker <span class="badge bg-primary fs-6">v1.0</span>
				</h1>
				<span class="badge bg-success">Special for Java Upper</span>
			</div>

			<div class="row mb-4">
				<div class="col-md-4" th:each="entry : ${topPrices}">
					<div class="card p-3 text-center shadow">
						<h6
							class="text-secondary mb-1"
							th:text="${entry.key} + ' Market Price'"
						>
							BTC Price
						</h6>
						<h3
							class="market-val mb-0"
							th:text="'$' + ${#numbers.formatDecimal(entry.value, 1, 2)}"
						>
							$0.00
						</h3>
					</div>
				</div>
			</div>

			<div class="card p-4 mb-4 shadow">
				<div class="d-flex justify-content-between align-items-center mb-3">
					<h5 class="text-white m-0">
						📈 <span th:text="${chartCoin}">BTC</span> History
					</h5>
					<form
						id="chartForm"
						action="/"
						method="get"
						class="d-flex gap-2"
						onsubmit="saveScroll()"
					>
						<input type="hidden" name="t" id="timeSalt" />
						<select
							name="chartCoin"
							class="form-select form-select-sm bg-dark text-white border-secondary"
							onchange="
								saveScroll()
								document.getElementById('timeSalt').value = Date.now()
								document.getElementById('chartForm').submit()
							"
						>
							<option
								th:each="t : ${availableTickers}"
								th:value="${t}"
								th:text="${t}"
								th:selected="${t == chartCoin}"
							></option>
						</select>
						<select
							name="days"
							class="form-select form-select-sm bg-dark text-white border-secondary"
							onchange="
								saveScroll()
								document.getElementById('timeSalt').value = Date.now()
								document.getElementById('chartForm').submit()
							"
						>
							<option value="1" th:selected="${chartDays == 1}">24h</option>
							<option value="7" th:selected="${chartDays == 7}">7 Days</option>
							<option value="30" th:selected="${chartDays == 30}">
								30 Days
							</option>
						</select>
					</form>
				</div>
				<div class="chart-container">
					<div id="chartStatus">No data from API. Please wait 1 min...</div>
					<canvas id="cryptoChart"></canvas>
				</div>
			</div>

			<div class="card p-4 mb-4">
				<h4 class="text-white mb-3">➕ Create New Portfolio</h4>
				<form
					th:action="@{/add}"
					method="post"
					class="row g-2"
					onsubmit="saveScroll()"
				>
					<div class="col-9">
						<input
							type="text"
							name="name"
							class="form-control bg-dark text-white border-secondary"
							placeholder="Ex: Long-term Savings"
							required
						/>
					</div>
					<div class="col-3">
						<button type="submit" class="btn btn-primary w-100">Create</button>
					</div>
				</form>
			</div>

			<div class="card p-4 shadow">
				<h4 class="text-white mb-4">📂 My Portfolios</h4>
				<div
					th:if="${portfolios.isEmpty()}"
					class="text-center p-4 text-secondary"
				>
					No portfolios found.
				</div>

				<div
					th:each="p : ${portfolios}"
					class="card bg-dark border-secondary mb-4 p-3 shadow-sm"
				>
					<div class="d-flex justify-content-between align-items-start mb-3">
						<div>
							<form
								th:action="@{/edit/{id}(id=${p.id})}"
								method="post"
								class="d-flex align-items-center mb-1"
								onsubmit="saveScroll()"
							>
								<input
									type="text"
									name="newName"
									th:value="${p.name}"
									class="form-control form-control-sm bg-dark text-white border-secondary me-2"
									style="width: 250px; font-weight: bold; font-size: 1.2rem"
								/>
								<button type="submit" class="btn btn-sm btn-outline-info">
									Rename
								</button>
							</form>
							<div class="portfolio-total">
								Total Value:
								<span
									th:text="'$' + ${#numbers.formatDecimal(p.totalValue, 1, 2)}"
									>$0.00</span
								>
							</div>
						</div>
						<a
							th:href="@{/delete/{id}(id=${p.id})}"
							class="btn btn-sm btn-outline-danger"
							onclick="
								saveScroll()
								return confirm('Delete portfolio?')
							"
							>Delete</a
						>
					</div>

					<div class="ps-3 border-start border-primary border-3">
						<div
							th:each="coin : ${p.coins}"
							class="coin-row d-flex justify-content-between align-items-center"
						>
							<div class="d-flex align-items-center">
								<span
									class="badge bg-warning text-dark me-3 py-2 px-3"
									th:text="${coin.ticker}"
									>BTC</span
								>
								<form
									th:action="@{/edit-coin/{id}(id=${coin.id})}"
									method="post"
									class="d-flex align-items-center"
									onsubmit="saveScroll()"
								>
									<input
										type="number"
										step="0.000001"
										min="0"
										name="newAmount"
										th:value="${coin.amount}"
										class="form-control form-control-sm bg-dark text-white border-secondary mx-2"
										style="width: 110px"
										required
									/>
									<button
										type="submit"
										class="btn btn-sm btn-link text-info p-0 text-decoration-none"
									>
										Update
									</button>
								</form>
							</div>
							<div class="d-flex align-items-center">
								<div class="text-end me-2">
									<div
										class="price-tag"
										th:text="'≈ $' + ${#numbers.formatDecimal(coin.totalValue, 1, 2)}"
									></div>
									<small
										class="text-secondary"
										th:text="'Price: $' + ${#numbers.formatDecimal(coin.currentPrice, 1, 2)}"
									></small>
								</div>
								<a
									th:href="@{/delete-coin/{id}(id=${coin.id})}"
									class="btn-delete-item"
									onclick="saveScroll()"
									>&times;</a
								>
							</div>
						</div>

						<form
							th:action="@{/add-coin/{id}(id=${p.id})}"
							method="post"
							class="row g-2 mt-3 p-2 bg-black bg-opacity-25 rounded"
							onsubmit="saveScroll()"
						>
							<div class="col-md-4">
								<select
									name="ticker"
									class="form-select form-select-sm bg-dark text-white border-secondary"
									required
								>
									<option value="" disabled selected>Select coin...</option>
									<option
										th:each="t : ${availableTickers}"
										th:value="${t}"
										th:text="${t}"
									>
										BTC
									</option>
								</select>
							</div>
							<div class="col-md-4">
								<input
									type="number"
									step="0.000001"
									min="0"
									name="amount"
									placeholder="Amount"
									class="form-control form-control-sm bg-dark text-white border-secondary"
									required
								/>
							</div>
							<div class="col-md-4">
								<button
									type="submit"
									class="btn btn-sm btn-warning w-100 fw-bold text-dark"
								>
									Add Asset
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			/*<![CDATA[*/
			(function() {
			  const rawData = [[${historyData}]];
			  const coinName = [[${chartCoin}]];
			  const canvas = document.getElementById('cryptoChart');
			  const status = document.getElementById('chartStatus');

			  if (!rawData || !Array.isArray(rawData) || rawData.length === 0) {
			      status.style.display = 'block';
			      return;
			  }

			  const ctx = canvas.getContext('2d');
			  if (window.myCryptoChart instanceof Chart) {
			      window.myCryptoChart.destroy();
			  }

			  window.myCryptoChart = new Chart(ctx, {
			    type: 'line',
			    data: {
			      labels: rawData.map((_, i) => i),
			      datasets: [{
			        label: coinName + ' Price',
			        data: rawData,
			        borderColor: '#ffc107',
			        backgroundColor: 'rgba(255, 193, 7, 0.1)',
			        fill: true,
			        pointRadius: 0,
			        tension: 0.1
			      }]
			    },
			    options: {
			      responsive: true,
			      maintainAspectRatio: false,
			      animation: false,
			      scales: {
			        x: { display: false },
			        y: { grid: { color: '#333' }, ticks: { color: '#888' }, beginAtZero: false }
			      },
			      plugins: { legend: { display: false } }
			    }
			  });
			})();
			/*]]>*/
		</script>
	</body>
</html>
